{% extends 'base.html' %}

{% block content %}

<section class="auth-section">
    <div class="auth-card">
        <h1>Report Listing</h1>
        <p>
            Report suspicious or fake listing:
            <strong>{{ listing.title }}</strong>
        </p>

        <form method="POST">
            {% csrf_token %}

            {% for field in form %}
                <div class="field">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}

            <button type="submit" class="submit-btn">
                Submit Report
            </button>
        </form>

        <p class="auth-link">
            <a href="{% url 'listing_detail' listing.pk %}">
                Back to Listing
            </a>
        </p>
    </div>
</section>

{% endblock %}
