{% extends 'base.html' %}

{% block content %}

<section class="auth-section">
    <div class="auth-card">
        <h1>Create Account</h1>
        <p>Join Room Finder Nepal as a tenant or landlord.</p>

        <form method="POST">
            {% csrf_token %}

            {% for field in form %}
                <div class="field">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}

            <button type="submit" class="submit-btn">Register</button>
        </form>

        <p class="auth-link">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>
    </div>
</section>

{% endblock %}
