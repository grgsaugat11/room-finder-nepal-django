{% extends 'base.html' %}

{% block content %}

<section class="auth-section">
    <div class="auth-card">
        <h1>Edit Profile</h1>
        <p>Update your personal details.</p>

        <form method="POST">
            {% csrf_token %}

            {% for field in form %}
                <div class="field">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}

            <button type="submit" class="submit-btn">
                Save Changes
            </button>
        </form>

        <p class="auth-link">
            <a href="{% url 'profile' %}">Back to Profile</a>
        </p>
    </div>
</section>

{% endblock %}
