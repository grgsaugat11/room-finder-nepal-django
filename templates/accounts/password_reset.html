{% extends 'base.html' %}

{% block content %}
<section class="password-reset-section">
    <div class="password-reset-card">
        <h1>Forgot Password</h1>
        <p>Enter your registered email address. We will send you a password reset link.</p>

        <form method="POST">
            {% csrf_token %}

            <div class="field">
                <label>Email Address</label>
                {{ form.email }}
                {{ form.email.errors }}
            </div>

            <button type="submit" class="submit-btn">
                Send Reset Link
            </button>
        </form>
    </div>
</section>
{% endblock %}
